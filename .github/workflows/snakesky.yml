name: Update SnakeSky

on:
  schedule:
    - cron: "*/5 * * * *"   # cada 5 minutos
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run updater
        run: node snakesky_updater.js
        env:
          BSKY_USERNAME: ${{ secrets.BSKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}

      - name: Commit changes
        run: |
          git config --global user.name "PerfectSky Bot"
          git config --global user.email "bot@example.com"
          git add snakesky.json
          git commit -m "Update SnakeSky state" || echo "No changes"
          git push
