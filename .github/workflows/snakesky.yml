name: Update SnakeSky

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run SnakeSky updater
        run: node snakesky_updater.js
        env:
          BSKY_USERNAME: ${{ secrets.SNAKESKY_USERNAME }}
          BSKY_PASSWORD: ${{ secrets.SNAKESKY_PASSWORD }}

      - name: Commit and push changes
        run: |
          git config --global user.name "PerfectSky Bot"
          git config --global user.email "bot@example.com"
          git add snakesky.json
          git commit -m "Update SnakeSky state" || echo "No changes to commit"
          git push
